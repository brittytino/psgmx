name: psgmx_mobile
description: Placement Preparation Program App for PSG Technology - MCA. A comprehensive platform for placement tracking, LeetCode integration, and student management.
publish_to: 'none'
version: 4.0.0
homepage: https://github.com/brittytino/psgmx-flutter
repository: https://github.com/brittytino/psgmx-flutter
issue_tracker: https://github.com/brittytino/psgmx-flutter/issues

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0
  provider: ^6.1.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  http: ^1.1.2
  url_launcher: ^6.2.2
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  # For CSV/XLSX parsing
  csv: ^8.0.0
  excel: ^4.0.3
  # For file picking
  file_picker: ^12.0.0-beta.7
  # For charts (optional but clean)
  fl_chart: ^1.2.0
  # For responsive design
  flutter_adaptive_scaffold: ^0.3.3+1
  flutter_local_notifications: ^22.0.1
  table_calendar: ^3.1.3
  timezone: ^0.11.0
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  share_plus: ^13.1.0
  package_info_plus: ^10.1.0
  font_awesome_flutter: ^11.0.0
  archive: ^3.6.1
  xml: ^6.6.1
  flutter_svg: ^2.3.0
  rive: ^0.14.8
  lucide_icons_flutter: ^3.1.14+2
  pinput: ^6.0.2
  flutter_native_splash: ^2.4.0
  flutter_windowmanager_plus: ^1.0.1
  dicebear_core: ^10.3.0
  dicebear_styles: ^10.2.0
  drift: ^2.34.2
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  drift_dev: ^2.34.4
  build_runner: ^2.15.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/home/
    - assets/images/splash/
    - assets/images/exam/
    - assets/icons/
    - assets/rive/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#FF6B6B"

flutter_native_splash:
  color: "#FAFAFA"
  image: "assets/images/logo.png"
  android_12:
    color: "#FAFAFA"
    image: "assets/images/logo.png"
