name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
      - dev
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Generate Environment File
        run: |
          cat > .env.flutter <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          ECAMPUS_API_URL=${{ secrets.ECAMPUS_API_URL }}
          ECAMPUS_API_SECRET=${{ secrets.ECAMPUS_API_SECRET }}
          EXTERNAL_PLATFORM_API_KEY=${{ secrets.EXTERNAL_PLATFORM_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Build Web
        run: |
          flutter build web --release --dart-define-from-file=.env.flutter
      
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PSGMXIANS }}
          channelId: live
          projectId: psgmxians
          entryPoint: apps/mobile
