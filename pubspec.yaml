name: psgmx_placement_prep
description: Placement Preparation Program App for PSG Technology - MCA. A comprehensive platform for placement tracking, LeetCode integration, and student management.
publish_to: 'none'
version: 4.0.0
homepage: https://github.com/brittytino/psgmx-flutter
repository: https://github.com/brittytino/psgmx-flutter
issue_tracker: https://github.com/brittytino/psgmx-flutter/issues

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0
  provider: ^6.1.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  http: ^1.1.2
  url_launcher: ^6.2.2
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  # For CSV/XLSX parsing
  csv: ^8.0.0
  excel: ^4.0.3
  # For file picking
  file_picker: ^12.0.0-beta.7
  # For charts (optional but clean)
  fl_chart: ^1.2.0
  # For responsive design
  flutter_adaptive_scaffold: ^0.3.3+1
  flutter_local_notifications: ^22.0.1
  table_calendar: ^3.1.3
  timezone: ^0.11.0
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  share_plus: ^13.1.0
  package_info_plus: ^10.1.0
  font_awesome_flutter: ^11.0.0
  archive: ^3.6.1
  xml: ^6.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
